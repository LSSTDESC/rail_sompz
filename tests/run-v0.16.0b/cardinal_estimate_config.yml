som_deepdeep_estimator:
  output_mode: default
  chunk_size: 10000
  hdf5_groupname: ''
  zbins_min: &id010 0.0 
  zbins_max: &id011 3.0 
  zbins_dz: &id012 0.01
  calculated_point_estimates: &id001 []
  recompute_point_estimates: false
  redshift_col: &id017 Z
  inputs: &id002
