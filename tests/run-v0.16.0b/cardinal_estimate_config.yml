  - TRUEMAG_lsst_g
  - TRUEMAG_lsst_r
  - TRUEMAG_lsst_i
  - TRUEMAG_lsst_z
  - TRUEMAG_lsst_y
  - TRUEMAG_J129
  - TRUEMAG_H158
  - TRUEMAG_F184  
  input_errs: &id003
  - TRUEMAG_ERR_lsst_u
  - TRUEMAG_ERR_lsst_g
  - TRUEMAG_ERR_lsst_r
  - TRUEMAG_ERR_lsst_i
  - TRUEMAG_ERR_lsst_z
  - TRUEMAG_ERR_lsst_y
  - TRUEMAG_ERR_J129
  - TRUEMAG_ERR_H158
  - TRUEMAG_ERR_F184  
  zero_points: &id004
  - 30.0
  - 30.0
  - 30.0
  - 30.0
  - 30.0  
  - 30.0
  - 30.0
  - 30.0
  - 30.0  
  som_shape: &id005
  - 32
  - 32
  som_minerror: 0.01
  som_wrap: &id013 false
  som_take_log: &id014 false
  convert_to_flux: &id015 true
  set_threshold: true
  thresh_val: 1.0e-05
  debug: &id016 false
  name: som_deepdeep_estimator
  model: model_deep.pkl
  assignment: deepdata_deep_assignment.hdf5
